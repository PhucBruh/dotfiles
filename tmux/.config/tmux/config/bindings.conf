bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi r send -X rectangle-toggle

bind r source-file ~/.config/tmux/tmux.conf \; display-message "reloaded tmux config"

bind c new-window -c "#{pane_current_path}"

bind '-' split-window -h -c "#{pane_current_path}"
bind 'v' split-window -v -c "#{pane_current_path}"

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-H resize-pane -L 2
bind -n M-J resize-pane -D 2
bind -n M-K resize-pane -U 2
bind -n M-L resize-pane -R 2

# bind -T prefix f display-menu -T "Launcher" -x C -y C \
#   "" \
#   "  Windows  (i)  " i { run-shell 'tmux set-option -g @sessionx-_window-mode on; tmux display-popup -w "#{@launcher-picker-width}" -h "#{@launcher-picker-height}" "~/.tmux/plugins/tmux-sessionx/scripts/sessionx.sh"' } \
#   "  Sessions (w)  " w { run-shell 'tmux set-option -g @sessionx-_window-mode off; tmux display-popup -w "#{@launcher-picker-width}" -h "#{@launcher-picker-height}" "~/.tmux/plugins/tmux-sessionx/scripts/sessionx.sh"' } \
